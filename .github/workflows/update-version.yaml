name: Update Version

on:
  push:
    branches:
      - main
    paths:
      - "include/lunisolar.h"
      - "scripts/gen_version_badge.py"
      - ".github/workflows/update-version.yaml"
  workflow_dispatch:

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate version badge
        run: python scripts/gen_version_badge.py

      - name: Check if version files changed
        id: check_diff
        run: |
          git add version_badge.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if author is allowed to update
        id: check_author
        run: |
          if [[ "${{ github.actor }}" == "JeongHan-Bae" ]]; then
            echo "authorized=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not authorized to commit. Actor is ${{ github.actor }}."
            echo "authorized=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Exit if not changed or unauthorized
        if: >
          steps.check_diff.outputs.changed != 'true' ||
          steps.check_author.outputs.authorized != 'true'
        run: |
          echo "Skipping update due to no generated changes or unauthorized actor."
          exit 0

      - name: Extract project version from version badge
        id: version
        run: |
          version=$(python -c 'import json; print(json.load(open("version_badge.json", encoding="utf-8"))["message"])')
          echo "project_version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up SSH keys
        env:
          SSH_SIGNING_KEY: ${{ secrets.SSH_SIGNING_KEY }}
          SSH_AUTH_KEY: ${{ secrets.SSH_AUTH_KEY }}
        run: |
          mkdir -p ~/.ssh

          if [ -z "$SSH_SIGNING_KEY" ]; then
            echo "SSH_SIGNING_KEY is empty"
            exit 1
          fi

          if [ -z "$SSH_AUTH_KEY" ]; then
            echo "SSH_AUTH_KEY is empty"
            exit 1
          fi

          printf '%s\n' "$SSH_SIGNING_KEY" | tr -d '\r' > ~/.ssh/id_ed25519_signing
          printf '%s\n' "$SSH_AUTH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519_github_actions

          chmod 600 ~/.ssh/id_ed25519_signing
          chmod 600 ~/.ssh/id_ed25519_github_actions

          ssh-keygen -y -f ~/.ssh/id_ed25519_signing > ~/.ssh/id_ed25519_signing.pub

          cat > ~/.ssh/config <<'EOF'
          Host github.com
            HostName github.com
            User git
            IdentityFile ~/.ssh/id_ed25519_github_actions
            IdentitiesOnly yes
          EOF

          ssh-keyscan -H github.com >> ~/.ssh/known_hosts
          ssh -T git@github.com || true

      - name: Configure Git for signed commits
        run: |
          git config --global gpg.format ssh
          git config --global user.signingkey ~/.ssh/id_ed25519_signing
          git config --global commit.gpgsign true
          git config --global user.name "JeongHan-Bae"
          git config --global user.email "mastropseudo@gmail.com"

      - name: Commit and push version files
        run: |
          git add version_badge.json
          git commit -S -m "auto-update(version): ${{ steps.version.outputs.project_version }}"
          git push git@github.com:${{ github.repository }}.git
